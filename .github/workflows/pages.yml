# GitHub Pages: static site (keep web/ and assets/ under the same parent)
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static bundle
        run: |
          mkdir -p _site
          cp -r web _site/web
          cp -r assets _site/assets
          # Root URL has no index otherwise → 404; app lives under /web/
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=web/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>TinyForge</title>
            <link rel="canonical" href="web/">
          </head>
          <body>
            <p><a href="web/">Open TinyForge</a></p>
          </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
